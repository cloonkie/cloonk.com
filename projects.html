<head>
  <meta charset="UTF-8" />

  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('cloonk-theme') === 'light' ? 'light' : 'dark');</script>

  <style>
    /* ─────────────────────────────────────────
       WORK PAGE LAYOUT — two-column: grid | panel
    ───────────────────────────────────────── */
    .work-page {
      position: relative;
    }

    .work-layout {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 0;
      align-items: start;
    }

    /* Left column: header + grid + pagination */
    .work-main {
      min-width: 0;
      padding-right: 2.5rem;
      border-right: 1px solid var(--border);
    }

    /* ─────────────────────────────────────────
       RIGHT PANEL — vertical filter sidebar
    ───────────────────────────────────────── */
    .work-panel {
      position: sticky;
      top: 72px; /* below nav */
      max-height: calc(100vh - 88px);
      overflow-y: auto;
      padding-left: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: none;
    }
    .work-panel::-webkit-scrollbar { display: none; }

    /* Panel header */
    .work-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .work-panel__title {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .work-panel__clear {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, color 0.2s;
    }
    .work-panel__clear.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .work-panel__clear:hover { color: var(--text); }

    /* ─────────────────────────────────────────
       PANEL SECTION — accordion (like detail-section-block)
    ───────────────────────────────────────── */
    .panel-section {
      border-bottom: 1px solid var(--border);
    }

    .panel-section__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 0;
      cursor: pointer;
      user-select: none;
    }
    .panel-section__header:hover .panel-section__label { color: var(--text); }

    .panel-section__label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.18s;
    }
    .panel-section.is-open .panel-section__label {
      color: var(--text);
    }

    /* +/× toggle — matches detail-section toggle style */
    .panel-section__toggle {
      position: relative;
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }
    .panel-toggle-bar {
      position: absolute;
      background: var(--muted);
      border-radius: 1px;
      transition: transform 0.22s ease, opacity 0.22s ease, background 0.18s;
    }
    .panel-toggle-bar--h {
      width: 10px; height: 1px;
      top: 50%; left: 0;
      transform: translateY(-50%);
    }
    .panel-toggle-bar--v {
      width: 1px; height: 10px;
      left: 50%; top: 0;
      transform: translateX(-50%);
      transition: transform 0.22s ease, opacity 0.22s ease;
    }
    .panel-section.is-open .panel-toggle-bar--v {
      transform: translateX(-50%) scaleY(0);
      opacity: 0;
    }
    .panel-section.is-open .panel-toggle-bar { background: var(--text); }

    /* Body collapse */
    .panel-section__body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease;
      opacity: 0;
    }
    .panel-section.is-open .panel-section__body {
      max-height: 300px;
      opacity: 1;
    }

    .panel-section__inner {
      padding-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    /* ─────────────────────────────────────────
       FILTER PILLS — vertical list style
    ───────────────────────────────────────── */
    .filter-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 5px 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-align: left;
      transition: color 0.15s;
      border-bottom: 1px solid transparent;
      gap: 0.5rem;
    }
    .filter-pill:hover:not(.is-disabled) { color: var(--text); }
    .filter-pill.active {
      color: var(--text);
      font-weight: 500;
    }
    .filter-pill.active::before {
      content: '→';
      font-size: 10px;
      margin-right: 0.25rem;
      color: var(--accent);
      flex-shrink: 0;
    }
    /* Zero-result: greyed out, not clickable */
    .filter-pill.is-disabled {
      color: var(--border);
      cursor: not-allowed;
      pointer-events: none;
    }
    .filter-pill.is-disabled .pill-count {
      opacity: 0.4;
    }

    /* Count bubble */
    .pill-count {
      font-size: 9px;
      letter-spacing: 0.05em;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }
    .filter-pill.active .pill-count { color: var(--accent); }

    /* Sort pills inside panel */
    .sort-pill {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 5px 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-align: left;
      transition: color 0.15s;
    }
    .sort-pill:hover { color: var(--text); }
    .sort-pill.active {
      color: var(--accent);
    }
    .sort-pill.active::before {
      content: '→';
      font-size: 10px;
      margin-right: 0.25rem;
      color: var(--accent);
    }

    /* ─────────────────────────────────────────
       ACTIVE CHIPS (compact, below header)
    ───────────────────────────────────────── */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      padding: 0.6rem 0 0.75rem;
      min-height: 0;
    }
    .active-chip {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 2px 7px 2px 8px;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .active-chip__remove {
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
      font-size: 11px;
      line-height: 1;
      background: none;
      border: none;
      color: inherit;
      padding: 0;
    }
    .active-chip__remove:hover { opacity: 1; }

    /* ─────────────────────────────────────────
       TOOLBAR ROW above main grid
    ───────────────────────────────────────── */
    .work-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 0;
    }
    .work-toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .work-toolbar-count {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Mobile toggle for panel */
    .work-panel-toggle {
      display: none;
      align-items: center;
      gap: 0.45rem;
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .work-panel-toggle .filter-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 8px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .work-panel-toggle .filter-badge.visible { opacity: 1; }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 860px) {
      .work-layout {
        grid-template-columns: 1fr;
      }
      .work-main {
        padding-right: 0;
        border-right: none;
      }
      .work-panel {
        position: fixed;
        top: 0; right: 0; bottom: 0;
        width: 260px;
        background: var(--bg);
        border-left: 1px solid var(--border);
        padding: 1.5rem 1.5rem 2rem;
        z-index: 100;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        max-height: 100vh;
        overflow-y: auto;
      }
      .work-panel.is-mobile-open {
        transform: translateX(0);
      }
      .work-panel-toggle {
        display: flex;
      }
    }
  </style>
</head>

  <script>
    /* Panel section accordion */
    document.querySelectorAll('.panel-section .panel-section__header').forEach(function(hdr) {
      hdr.addEventListener('click', function() {
        var sec = hdr.closest('.panel-section');
        var open = sec.classList.toggle('is-open');
        hdr.setAttribute('aria-expanded', String(open));
      });
      hdr.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); hdr.click(); }
      });
    });

    /* Mobile panel toggle */
    var panelEl = document.getElementById('work-panel');
    var toggleBtn = document.getElementById('btn-panel-toggle');
    if (toggleBtn && panelEl) {
      toggleBtn.addEventListener('click', function() {
        panelEl.classList.toggle('is-mobile-open');
      });
      /* Close on outside click */
      document.addEventListener('click', function(e) {
        if (panelEl.classList.contains('is-mobile-open')
            && !panelEl.contains(e.target)
            && e.target !== toggleBtn) {
          panelEl.classList.remove('is-mobile-open');
        }
      });
    }
  </script>
