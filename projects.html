<main>
    <div class="page work-page">

      <div class="work-header fade-in">
        <div class="work-header__top">
          <div>
            <p class="label label--gold">Work</p>
            <h1 class="work-title">Selected Projects</h1>
          </div>
          <span class="work-count" id="work-count">25 projects</span>
        </div>

        <div class="filter-row">
          <span class="filter-row__label">Topic</span>
          <div class="filter-group" id="filter-topic">
            <button class="filter-btn active" data-topic="all">All</button>
            <button class="filter-btn" data-topic="fashion">Fashion</button>
            <button class="filter-btn" data-topic="marketing">Marketing</button>
            <button class="filter-btn" data-topic="trend">Trend</button>
            <button class="filter-btn" data-topic="design">Design</button>
            <button class="filter-btn" data-topic="ux research">UX Research</button>
            <button class="filter-btn" data-topic="analytics">Analytics</button>
            <button class="filter-btn" data-topic="data analysis">Data Analysis</button>
            <button class="filter-btn" data-topic="seo">SEO</button>
            <button class="filter-btn" data-topic="research">Research</button>
          </div>
        </div>

        <div class="filter-row">
          <span class="filter-row__label">Year</span>
          <div class="filter-group" id="filter-year">
            <button class="filter-btn active" data-year="all">All</button>
            <button class="filter-btn" data-year="2021">2021</button>
            <button class="filter-btn" data-year="2022">2022</button>
            <button class="filter-btn" data-year="2023">2023</button>
            <button class="filter-btn" data-year="2024">2024</button>
            <button class="filter-btn" data-year="2025">2025</button>
          </div>
        </div>

        <div class="filter-row">
        <span class="filter-row__label">School</span>

          <button class="filter-btn active" data-affiliation="all">Affiliation</button>
          <button class="filter-btn" data-affiliation="lim">FIT</button>
          <button class="filter-btn" data-affiliation="pratt">Pratt</button>
          <button class="filter-btn" data-affiliation="professional">Professional</button>
        </div>
      </div>
      </div>


      <hr class="divider fade-in" />

      <div class="work-grid" id="work-grid"></div>

      <p class="work-empty" id="work-empty" style="display:none;">
        No projects match this filter.
      </p>

      <div class="work-pagination" id="work-pagination">
        <span class="work-pagination__info" id="pagination-info"></span>
