  <style>
    /* ── Lock to one viewport, like the index carousel ── */
    html { height: 100%; overflow: hidden; }
    body.projects-pit-body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /* ── The pit: full area between nav and footer ── */
    .pit {
      position: fixed;
      top: var(--nav-h);
      left: 0;
      right: 0;
      bottom: var(--nav-h);
      overflow: hidden;
      cursor: default;
    }

    /* Faint label sitting behind the pills */
    .pit__heading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }
    .pit__heading h1 {
      font-family: var(--font-display);
      font-size: clamp(40px, 12vw, 160px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--fg);
      opacity: 0.05;
      margin: 0;
      line-height: 0.9;
    }
    .pit__heading p {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.6;
      margin: 0.8rem 0 0;
    }
    /* Cross-link to Work — re-enable pointer events the heading turns off */
    .pit__sub a {
      pointer-events: auto;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }
    .pit__sub a:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ── Floating pills ── */
    .float-pill {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: clamp(12px, 1.1vw, 15px);
      letter-spacing: 0.01em;
      text-decoration: none;
      will-change: transform;
      transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease,
                  border-radius 0.26s ease, padding 0.26s ease, box-shadow 0.26s ease;
      z-index: 1;
      /* transform set by JS via --x / --y */
      transform: translate3d(var(--x, 0), var(--y, 0), 0);
    }
    .float-pill__row {
      display: inline-flex;
      align-items: baseline;
      white-space: nowrap;
    }
    .float-pill__name { font-weight: 500; }
    .float-pill__year {
      margin-left: 9px;
      font-size: 0.78em;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .float-pill:hover,
    .float-pill:focus-visible {
      border-color: var(--accent);
      z-index: 6;
      outline: none;
    }
    .float-pill:hover .float-pill__name,
    .float-pill:focus-visible .float-pill__name { color: var(--accent); }

    /* Blurb — collapsed by default, expands when the pill is held open */
    .float-pill__blurb {
      display: block;
      width: 0;
      max-height: 0;
      margin-top: 0;
      overflow: hidden;
      opacity: 0;
      font-size: 12.5px;
      line-height: 1.45;
      letter-spacing: 0;
      text-transform: none;
      color: var(--muted);
      white-space: normal;
      transition: width 0.28s ease, max-height 0.28s ease,
                  opacity 0.2s ease, margin-top 0.28s ease;
    }

    /* Expanded (paused) state — set by JS on hover/focus */
    .float-pill.is-open {
      border-radius: 16px;
      padding: 12px 16px 14px;
      border-color: var(--accent);
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.3);
      cursor: default;
      z-index: 7;
    }
    .float-pill.is-open .float-pill__blurb {
      width: clamp(190px, 24vw, 270px);
      max-height: 180px;
      margin-top: 8px;
      opacity: 1;
    }

    /* Reduced-motion: pills stay put, lay out as a centered wrap */
    @media (prefers-reduced-motion: reduce) {
      .pit { display: flex; align-items: center; justify-content: center; }
      .pit__inner-static {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-content: center;
        justify-content: center;
        max-width: 900px;
        padding: 0 var(--page-pad);
      }
      .float-pill { position: static; transform: none !important; }
    }
  </style>
