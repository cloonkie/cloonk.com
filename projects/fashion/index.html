    /* Restore the clock — fashion.css hides it by default on fashion pages.
       Desktop/tablet only; on mobile (≤640px) the global nav rule keeps it

    @media (min-width: 641px) {

    /* ─── Use-case mini-diagrams on each tool card ───────────────
       The cards are built by fashion.js from the TOOLS manifest; the
       SVG markup lives in the FASHION_VIZ registry below and is keyed
       by tool file. These rules theme the shared shape classes so the
       diagrams track light/dark and the accent color automatically. */
    .file__viz {
      flex: 1 1 auto;
      min-height: 0;
      margin: 14px 0 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .file__viz svg { width: 100%; height: 100%; max-height: 156px; }
    .file__viz .ln  { fill: none; stroke: var(--text-muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .file__viz .ac  { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .file__viz .flm { fill: var(--text-muted); }
    .file__viz .fdim { fill: var(--text-muted); opacity: 0.16; }
    .file__viz .fac { fill: var(--accent); }
    .file__viz .fbg { fill: var(--archive-paper, var(--bg)); }
    .file__viz .fwash { fill: var(--accent); opacity: 0.14; }
    .file__viz .chk { fill: none; stroke: var(--accent-fg); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .file:hover .file__viz .ln { stroke: var(--text); }

    /* Dark mode — the default --text-muted (#888882) washes out against the
       dark card, so lift the diagram greys for more contrast. Accent stays. */
    [data-theme="dark"] .file__viz .ln  { stroke: #c2bdb2; }
    [data-theme="dark"] .file__viz .flm { fill: #c2bdb2; }
    [data-theme="dark"] .file__viz .fdim { fill: #cfcabf; opacity: 0.26; }

    /* On phones the card height is tight — cap the diagram so the foot
       (Source/Output + Withdraw) always stays inside the card. */
    @media (max-width: 780px) {
      .file__viz { margin: 8px 0 2px; }
      .file__viz svg { max-height: 92px; }
    }
  </style>
