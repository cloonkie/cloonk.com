<style>
/* ── Reset + tokens ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* Ensure [hidden] always wins over display rules below (.empty-state,
   .filter-grid set display:grid, which would otherwise keep showing). */
[hidden] { display: none !important; }
img, canvas { display: block; max-width: 100%; }
button { cursor: pointer; font: inherit; background: none; border: none; }
a { color: inherit; text-decoration: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

:root {
  --bg:             #0a0a0a;
  --fg:             #faf8f3;
  --surface:        #161614;
  --surface-raised: #20201d;
  --surface-card:   #252521;
  --border:         #343430;
  --border-hover:   #4a4a44;
  --text:           #faf8f3;
  --text-muted:     #989890;
  --text-dim:       #707069;
  --accent:         #39ff14;
  --accent-hover:   #5cff44;
  --accent-fg:      #0a0a0a;
  --accent-dim:     rgba(57,255,20,0.1);
  --danger:         #ff5b4a;
  --warn:           #e8b931;
  --radius:    12px;
  --radius-sm:  8px;
  --radius-xs:  4px;
  --font-display: 'Cabinet Grotesk', sans-serif;
  --font-body:    'Satoshi', sans-serif;
  --font-mono:    'DM Mono', 'Courier New', monospace;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg:             #f5f2ec;
  --fg:             #0a0a0a;
  --surface:        #ede9e1;
  --surface-raised: #e4dfd4;
  --surface-card:   #eae6dc;
  --border:         #d0ccc4;
  --border-hover:   #b6b2aa;
  --text:           #0a0a0a;
  --text-muted:     #5a5a54;
  --text-dim:       #8a8a82;
  --accent:         #1b09bc;
  --accent-hover:   #2e1cd6;
  --accent-fg:      #f5f2ec;
  --accent-dim:     rgba(27,9,188,0.08);
  --danger:         #b03020;
  --warn:           #b86d00;
}

html { font-size: 15px; }
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Header ────────────────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 24px;
  background: color-mix(in oklab, var(--bg) 86%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
}
[data-theme="light"] .header { background: rgba(245,242,236,0.88); }
.header-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }
.nav__logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
  text-decoration: none;
  white-space: nowrap;
  transition: color var(--transition);
}
.nav__logo:hover { color: var(--accent); }
.header-project {
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
  padding-left: 14px;
  border-left: 1px solid var(--border);
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 0.64rem;
  color: var(--text-dim);
}
.header-badge::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-actions .btn:not(.btn-accent) { border-color: transparent; background: transparent; }
.header-actions .btn:not(.btn-accent):hover { border-color: var(--border); background: var(--surface); }
.header-actions .icon-btn { border-color: transparent; background: transparent; }
.header-actions .icon-btn:hover { border-color: var(--border); background: var(--surface); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 32px; padding: 6px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  font-size: 0.78rem; font-weight: 600; white-space: nowrap;
  transition: background var(--transition), border-color var(--transition), color var(--transition), opacity var(--transition);
}
.btn:hover { background: var(--surface-raised); border-color: var(--border-hover); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }
.btn-accent { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); font-weight: 700; }
.btn-accent:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-sm { min-height: 28px; padding: 4px 10px; font-size: 0.72rem; }

.icon-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-muted);
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}
.icon-btn:hover { background: var(--surface-raised); border-color: var(--border-hover); color: var(--text); }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.icon-moon { display: none; }
[data-theme="light"] .icon-sun { display: none; }
[data-theme="light"] .icon-moon { display: block; }

/* ── Shell layout ──────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 57px);
}
@media (max-width: 860px) { .shell { grid-template-columns: 1fr; } }

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
@media (max-width: 860px) { .sidebar { border-right: none; border-bottom: 1px solid var(--border); } }

.sidebar-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}

/* Dropzone */
.dropzone {
  position: relative;
  min-height: 120px;
  display: grid;
  place-items: center;
  padding: 16px;
  border: 1px dashed var(--border-hover);
  border-radius: var(--radius-sm);
  background: var(--surface-card);
  cursor: pointer;
  text-align: center;
  transition: border-color var(--transition), background var(--transition);
}
.dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--surface-raised); }
.dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.dz-title { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
.dz-sub { color: var(--text-muted); font-size: 0.74rem; line-height: 1.5; }

/* Privacy note */
.privacy-note {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 11px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface);
  font-family: var(--font-mono);
  font-size: 0.66rem;
  color: var(--text-dim);
  line-height: 1.5;
}
.privacy-note::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 4px;
}

/* Filter list in sidebar */
.filter-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  list-style: none;
}
.filter-list-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border: 1px solid transparent;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
  user-select: none;
  color: var(--text);
  text-align: left;
}
.filter-list-item:hover { background: var(--surface-raised); border-color: var(--border); }
.filter-list-item.active { background: var(--accent-dim); border-color: var(--accent); }
.fli-icon {
  width: 28px; height: 28px; flex-shrink: 0;
  display: grid; place-items: center;
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  background: var(--surface-card); color: var(--text-muted);
  transition: color var(--transition), border-color var(--transition), background var(--transition);
}
.fli-icon svg { width: 14px; height: 14px; }
.filter-list-item:hover .fli-icon { color: var(--text); border-color: var(--border-hover); }
.filter-list-item.active .fli-icon { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
.fli-text { min-width: 0; }
.fli-name { display: block; font-size: 0.8rem; font-weight: 600; line-height: 1.2; }
.fli-sub { display: block; font-size: 0.64rem; color: var(--text-muted); font-family: var(--font-mono); }
.filter-list-item.active .fli-name { color: var(--accent); }

/* Grid cell label with icon */
.filter-label {
  display: flex; align-items: center; gap: 8px;
}
.filter-icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-dim); }
.filter-label-text strong { display: block; font-size: 0.8rem; font-weight: 700; line-height: 1.2; }
.filter-label-text em { font-style: normal; font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); }

/* ── Main content ──────────────────────────────────────────── */
.content {
  padding: 20px 22px 60px;
  min-width: 0;
}
.studio-status {
  margin-bottom: 14px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.68rem;
}
.workspace {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 18px;
  align-items: start;
}
@media (max-width: 1100px) {
  .workspace { grid-template-columns: 1fr; }
  .settings-box { grid-row: 1; }
}

/* Empty state */
.empty-state {
  display: grid;
  place-items: center;
  min-height: 400px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state-inner { max-width: 28ch; }
.empty-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-sub { font-size: 0.86rem; line-height: 1.6; }

/* Filter grid */
.filter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
@media (max-width: 600px) { .filter-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

.filter-cell {
  width: 100%;
  color: var(--text);
  text-align: left;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-card);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
}
.filter-cell:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
.filter-cell.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.filter-cell[data-id="original"] { cursor: default; }
.filter-cell[data-id="original"]:hover { transform: none; box-shadow: none; border-color: var(--border); }

.filter-canvas-wrap {
  height: 160px;
  display: grid;
  place-items: center;
  overflow: hidden;
  background:
    linear-gradient(45deg,#2a2a26 25%,transparent 25%),
    linear-gradient(-45deg,#2a2a26 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#2a2a26 75%),
    linear-gradient(-45deg,transparent 75%,#2a2a26 75%);
  background-size: 12px 12px;
  background-position: 0 0,0 6px,6px -6px,-6px 0;
  background-color: #1c1c18;
}
[data-theme="light"] .filter-canvas-wrap {
  background-color: #e0dcd4;
  background-image:
    linear-gradient(45deg,#ccc8c0 25%,transparent 25%),
    linear-gradient(-45deg,#ccc8c0 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#ccc8c0 75%),
    linear-gradient(-45deg,transparent 75%,#ccc8c0 75%);
}
.filter-canvas {
  max-width: 100%;
  max-height: 160px;
  display: block;
  image-rendering: pixelated;
}

/* Cell label styled via .filter-label / .filter-icon / .filter-label-text in the icon section */
.filter-label { padding: 7px 10px; border-top: 1px solid var(--border); }

/* ── Settings panel ────────────────────────────────────────── */
.settings-box {
  padding: 16px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  position: sticky;
  top: 76px;
}
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.settings-title {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
}
.settings-title em { font-style: normal; color: var(--text-muted); font-weight: 500; margin-left: 6px; font-family: var(--font-mono); font-size: 0.72rem; }
.settings-close {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  background: transparent; color: var(--text-muted); font-size: 1.1rem; line-height: 1;
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition);
}
.settings-close:hover { color: var(--text); border-color: var(--border-hover); }

.settings-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.55;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.settings-desc:empty { display: none; }
.settings-content { display: flex; flex-direction: column; gap: 12px; }
.param-row { display: grid; gap: 6px; }
.param-label {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.param-controls { display: flex; align-items: center; gap: 10px; }
.param-controls input[type=range] {
  flex: 1;
  -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 2px;
  background: var(--border-hover); outline: none;
  accent-color: var(--accent);
}
.param-controls select {
  flex: 1;
  min-height: 34px;
  padding: 6px 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface-card);
  color: var(--text);
  font: inherit;
}
.param-controls input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 0;
}
.param-controls input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 0;
}
.param-val {
  min-width: 38px; text-align: right;
  font-family: var(--font-mono); font-size: 0.78rem; color: var(--text);
}
.param-controls select + .param-val { display: none; }

/* ── Toast ─────────────────────────────────────────────────── */
.toast {
  position: fixed; right: 20px; bottom: 20px; z-index: 1000;
  max-width: min(360px, calc(100vw - 40px));
  padding: 11px 14px;
  border: 1px solid var(--border-hover); border-radius: var(--radius-sm);
  background: var(--surface-raised); color: var(--text);
  box-shadow: 0 12px 36px rgba(0,0,0,0.35);
  font-size: 0.84rem;
  opacity: 0; transform: translateY(8px); pointer-events: none;
  transition: opacity var(--transition), transform var(--transition);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Filter list toggle (mobile) ────────────────────────────── */
.filter-list-toggle {
  display: none;
  width: 100%;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface-card);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}
.filter-list-toggle:hover { background: var(--surface-raised); border-color: var(--border-hover); }
.filter-list-toggle-arrow { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s; }
.filter-list-toggle[aria-expanded="true"] .filter-list-toggle-arrow { transform: rotate(180deg); }

/* ── Filter tooltip ─────────────────────────────────────────── */
.filter-tooltip {
  position: fixed;
  z-index: 200;
  max-width: 240px;
  padding: 8px 12px;
  border: 1px solid var(--border-hover);
  border-radius: var(--radius-xs);
  background: var(--surface-raised);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  font-size: 0.78rem;
  line-height: 1.5;
  color: var(--text-muted);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.filter-tooltip.visible { opacity: 1; }
.filter-tooltip-name {
  display: block;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.filter-tooltip-name em {
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 5px;
}
@media (hover: none) { .filter-tooltip { display: none; } }

/* ── Mobile header adjustments ─────────────────────────────── */
@media (max-width: 860px) {
  .filter-list-toggle { display: flex; }
  .filter-list-wrap { overflow: hidden; }
  .filter-list-wrap[hidden] { display: none; }
}
@media (max-width: 600px) {
  .header { padding: 11px 16px; }
  .header-badge { display: none; }
  .content { padding: 14px 14px 50px; }
  .sidebar { padding: 16px 14px; }
  .btn-sm { min-height: 36px; padding: 6px 12px; } /* larger touch targets */
  .filter-canvas-wrap { height: 130px; }
  .filter-canvas { max-height: 130px; }
  .settings-box { top: 64px; }
  .all-tools-btn { display: none; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    scroll-behavior: auto !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

  <div class="header-left">
    <a class="nav__logo" id="nav-logo" href="../../index.html">cloonk ʕ·ᴥ·ʔ</a>

  </div>
  <div class="header-actions">
    <button class="btn btn-sm btn-accent" id="downloadBtn" disabled>Download</button>
    <a class="btn btn-sm" href="catalog.html">Catalog</a>
    <a class="btn btn-sm all-tools-btn" href="../">All tools</a>
    <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- ── Layout ────────────────────────────────────────────────── -->
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <p class="sidebar-label">Source image</p>
      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*">
        <span>
          <p class="dz-title">Drop or tap to add image</p>
          <p class="dz-sub">PNG · JPEG · WebP · GIF · BMP</p>
        </span>
      </label>
    </div>

    <div class="privacy-note">
      All processing runs locally. Nothing is uploaded.
    </div>

    <div>
      <p class="sidebar-label">Filters</p>
      <button class="filter-list-toggle" id="filterListToggle" aria-expanded="false" aria-controls="filterListWrap">
        <span id="filterListToggleLabel">Filters</span>
        <span class="filter-list-toggle-arrow">▾</span>
      </button>
      <div class="filter-list-wrap" id="filterListWrap" hidden>
        <ul class="filter-list" id="filterList">
          <!-- populated by JS -->
        </ul>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="content">
    <div class="studio-status" id="studioStatus" role="status" aria-live="polite" hidden></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-state-inner">
        <p class="empty-title">No image yet</p>
        <p class="empty-sub">Drop or tap an image above — all 28 filters render simultaneously.</p>
      </div>
    </div>

    <div class="workspace">
      <!-- Filter grid (hidden until image loaded) -->
      <div id="filterGrid" class="filter-grid" hidden></div>

      <!-- Settings panel (hidden until filter selected) -->
      <aside class="settings-box" id="settingsBox" aria-labelledby="settingsTitle" hidden>
        <div class="settings-header">
          <span class="settings-title" id="settingsTitle"></span>
          <button class="settings-close" id="closeSettings" aria-label="Close settings">&times;</button>
        </div>
        <p class="settings-desc" id="settingsDesc"></p>
        <div id="settingsContent" class="settings-content"></div>
      </aside>
    </div>
  </main>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="darkroom.js"></script>
<script>
(function() {
  const list = document.getElementById('filterList');
  FILTERS.forEach((f, i) => {
    const li = document.createElement('li');
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'filter-list-item';
    button.dataset.id = f.id;
    button.setAttribute('aria-pressed', 'false');
    button.innerHTML = `
      <span class="fli-icon" aria-hidden="true">${filterIcon(f.id)}</span>
      <span class="fli-text"><span class="fli-name">${f.name}</span><span class="fli-sub">${f.sub}</span></span>
    `;
    button.addEventListener('click', () => {
      if (!state.src) { showToast('Upload an image first.'); return; }
      selectFilter(f.id);
    });
    li.appendChild(button);
    list.appendChild(li);
  });

  // Pre-select filter from URL hash (from catalog deeplink)
  const hashId = location.hash.replace('#','');
  if (hashId && FILTERS.find(f => f.id === hashId)) {
    // Store for when image loads — selectFilter requires an image
    window._pendingFilterId = hashId;
    const pending = FILTERS.find(f => f.id === hashId);
    const status = document.getElementById('studioStatus');
    if (pending && status) {
      status.textContent = `Upload an image to use ${pending.name}.`;
      status.hidden = false;
    }
    // Highlight the sidebar item immediately so user knows what's pre-selected
    const li = document.querySelector('.filter-list-item[data-id="' + hashId + '"]');
    if (li) li.classList.add('active');
  }

  // Mobile: filter list toggle
  const toggle = document.getElementById('filterListToggle');
  const wrap   = document.getElementById('filterListWrap');
  const label  = document.getElementById('filterListToggleLabel');
  if (toggle && wrap) {
    const count = FILTERS.length;
    const isMobile = () => window.innerWidth <= 860;
    function syncToggle() {
      if (isMobile()) {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        label.textContent = count + ' filters';
        wrap.hidden = !expanded;
      } else {
        wrap.hidden = false; // always visible on desktop
      }
    }
    toggle.addEventListener('click', () => {
      const expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!expanded));
      syncToggle();
    });
    window.addEventListener('resize', syncToggle);
    syncToggle();
  }

})();
</script>
</body>
</html>
