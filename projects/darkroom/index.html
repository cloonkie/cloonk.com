<style>
/* ── Reset + tokens ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* Ensure [hidden] always wins over display rules below (.empty-state,
   .filter-grid set display:grid, which would otherwise keep showing). */
[hidden] { display: none !important; }
img, canvas { display: block; max-width: 100%; }
button { cursor: pointer; font: inherit; background: none; border: none; }
a { color: inherit; text-decoration: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

:root {
  --bg:             #0a0a0a;
  --fg:             #faf8f3;
  --surface:        #161614;
  --surface-raised: #20201d;
  --surface-card:   #252521;
  --border:         #343430;
  --border-hover:   #4a4a44;
  --text:           #faf8f3;
  --text-muted:     #989890;
  --text-dim:       #707069;
  --accent:         #39ff14;
  --accent-hover:   #5cff44;
  --accent-fg:      #0a0a0a;
  --accent-dim:     rgba(57,255,20,0.1);
  --danger:         #ff5b4a;
  --warn:           #e8b931;
  --radius:    12px;
  --radius-sm:  8px;
  --radius-xs:  4px;
  --font-display: 'Cabinet Grotesk', sans-serif;
  --font-body:    'Satoshi', sans-serif;
  --font-mono:    'DM Mono', 'Courier New', monospace;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg:             #f5f2ec;
  --fg:             #0a0a0a;
  --surface:        #ede9e1;
  --surface-raised: #e4dfd4;
  --surface-card:   #eae6dc;
  --border:         #d0ccc4;
  --border-hover:   #b6b2aa;
  --text:           #0a0a0a;
  --text-muted:     #5a5a54;
  --text-dim:       #8a8a82;
  --accent:         #1b09bc;
  --accent-hover:   #2e1cd6;
  --accent-fg:      #f5f2ec;
  --accent-dim:     rgba(27,9,188,0.08);
  --danger:         #b03020;
  --warn:           #b86d00;
}

html { font-size: 15px; }
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Header ────────────────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 24px;
  background: color-mix(in oklab, var(--bg) 86%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
}
[data-theme="light"] .header { background: rgba(245,242,236,0.88); }
.header-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }
.nav__logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
  text-decoration: none;
  white-space: nowrap;
  transition: color var(--transition);
}
.nav__logo:hover { color: var(--accent); }
.header-project {
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
  padding-left: 14px;
  border-left: 1px solid var(--border);
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 0.64rem;
  color: var(--text-dim);
}
.header-badge::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-actions .btn:not(.btn-accent) { border-color: transparent; background: transparent; }
.header-actions .btn:not(.btn-accent):hover { border-color: var(--border); background: var(--surface); }
.header-actions .icon-btn { border-color: transparent; background: transparent; }
.header-actions .icon-btn:hover { border-color: var(--border); background: var(--surface); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 32px; padding: 6px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  font-size: 0.78rem; font-weight: 600; white-space: nowrap;
  transition: background var(--transition), border-color var(--transition), color var(--transition), opacity var(--transition);
}
.btn:hover { background: var(--surface-raised); border-color: var(--border-hover); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }
.btn-accent { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); font-weight: 700; }
.btn-accent:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-sm { min-height: 28px; padding: 4px 10px; font-size: 0.72rem; }

.icon-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-muted);
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}
.icon-btn:hover { background: var(--surface-raised); border-color: var(--border-hover); color: var(--text); }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.icon-moon { display: none; }
[data-theme="light"] .icon-sun { display: none; }
[data-theme="light"] .icon-moon { display: block; }

/* ── Shell layout ──────────────────────────────────────────── */
.shell { min-height: calc(100vh - 57px); }

/* ── Discovery toolbar ─────────────────────────────────────── */
.toolbar {
  position: sticky;
  top: 57px;
  z-index: 20;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 22px;
  background: color-mix(in oklab, var(--bg) 90%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
}
[data-theme="light"] .toolbar { background: rgba(245,242,236,0.90); }
.source-control {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 5px 6px 5px 8px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  cursor: pointer;
  white-space: nowrap;
  transition: border-color var(--transition), background var(--transition);
}
.source-control:hover, .source-control.drag { border-color: var(--accent); background: var(--surface-raised); }
.source-control input { display: none; }
.source-thumb {
  width: 26px; height: 26px; flex-shrink: 0;
  border-radius: 50%;
  object-fit: cover;
  background: var(--surface-card);
  display: grid; place-items: center;
  font-size: 0.9rem;
  border: 1px solid var(--border);
}
.source-thumb canvas, .source-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.source-meta { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
.source-name {
  font-size: 0.74rem; font-weight: 600; max-width: 14ch;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.source-sub { font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-dim); }
.search-wrap { position: relative; flex: 1; min-width: 130px; max-width: 280px; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; stroke: var(--text-dim); fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
}
.search-input {
  width: 100%; min-height: 32px; padding: 6px 10px 6px 30px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  font-family: var(--font-body); font-size: 0.8rem; outline: none;
  transition: border-color var(--transition);
}
.search-input:focus { border-color: var(--accent); }
.family-filters { display: flex; flex-wrap: wrap; gap: 6px; }
.family-btn {
  padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 999px;
  background: transparent; color: var(--text-muted);
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.06em;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}
.family-btn:hover { background: var(--surface-raised); border-color: var(--border-hover); color: var(--text); }
.family-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.filter-count { margin-left: auto; font-family: var(--font-mono); font-size: 0.66rem; color: var(--text-dim); white-space: nowrap; }
.filter-cell[data-hidden] { display: none; }
@media (max-width: 720px) {
  .toolbar { padding: 8px 14px; }
  .family-filters { order: 3; width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
  .filter-count { display: none; }
}

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
@media (max-width: 860px) { .sidebar { border-right: none; border-bottom: 1px solid var(--border); } }

.sidebar-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}

/* Dropzone */
.dropzone {
  position: relative;
  min-height: 120px;
  display: grid;
  place-items: center;
  padding: 16px;
  border: 1px dashed var(--border-hover);
  border-radius: var(--radius-sm);
  background: var(--surface-card);
  cursor: pointer;
  text-align: center;
  transition: border-color var(--transition), background var(--transition);
}
.dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--surface-raised); }
.dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.dz-title { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
.dz-sub { color: var(--text-muted); font-size: 0.74rem; line-height: 1.5; }

/* Privacy note */
.privacy-note {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 11px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface);
  font-family: var(--font-mono);
  font-size: 0.66rem;
  color: var(--text-dim);
  line-height: 1.5;
}
.privacy-note::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 4px;
}

/* Filter list in sidebar */
.filter-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  list-style: none;
}
.filter-list-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border: 1px solid transparent;
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
  user-select: none;
  color: var(--text);
  text-align: left;
}
.filter-list-item:hover { background: var(--surface-raised); border-color: var(--border); }
.filter-list-item.active { background: var(--accent-dim); border-color: var(--accent); }
.fli-icon {
  width: 28px; height: 28px; flex-shrink: 0;
  display: grid; place-items: center;
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  background: var(--surface-card); color: var(--text-muted);
  transition: color var(--transition), border-color var(--transition), background var(--transition);
}
.fli-icon svg { width: 14px; height: 14px; }
.filter-list-item:hover .fli-icon { color: var(--text); border-color: var(--border-hover); }
.filter-list-item.active .fli-icon { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
.fli-text { min-width: 0; }
.fli-name { display: block; font-size: 0.8rem; font-weight: 600; line-height: 1.2; }
.fli-sub { display: block; font-size: 0.64rem; color: var(--text-muted); font-family: var(--font-mono); }
.filter-list-item.active .fli-name { color: var(--accent); }

/* Grid cell label with icon */
.filter-label {
  display: flex; align-items: center; gap: 8px;
}
.filter-icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-dim); }
.filter-label-text strong { display: block; font-size: 0.8rem; font-weight: 700; line-height: 1.2; }
.filter-label-text em { font-style: normal; font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); }

/* ── Main content ──────────────────────────────────────────── */
.content {
  padding: 20px 22px 60px;
  min-width: 0;
}
.studio-status {
  margin-bottom: 14px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.68rem;
}
.workspace { min-width: 0; }

/* Empty state */
.empty-state {
  display: grid;
  place-items: center;
  min-height: 400px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state-inner { max-width: 28ch; }
.empty-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-sub { font-size: 0.86rem; line-height: 1.6; }

/* Filter grid */
.filter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
@media (max-width: 600px) { .filter-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

.filter-cell {
  display: block;
  width: 100%;
  color: var(--text);
  text-align: left;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-card);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
}
.filter-cell:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
.filter-cell.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.filter-cell[data-id="original"] { cursor: default; }
.filter-cell[data-id="original"]:hover { transform: none; box-shadow: none; border-color: var(--border); }

.filter-canvas-wrap {
  height: 160px;
  display: grid;
  place-items: center;
  overflow: hidden;
  background:
    linear-gradient(45deg,#2a2a26 25%,transparent 25%),
    linear-gradient(-45deg,#2a2a26 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#2a2a26 75%),
    linear-gradient(-45deg,transparent 75%,#2a2a26 75%);
  background-size: 12px 12px;
  background-position: 0 0,0 6px,6px -6px,-6px 0;
  background-color: #1c1c18;
}
[data-theme="light"] .filter-canvas-wrap {
  background-color: #e0dcd4;
  background-image:
    linear-gradient(45deg,#ccc8c0 25%,transparent 25%),
    linear-gradient(-45deg,#ccc8c0 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#ccc8c0 75%),
    linear-gradient(-45deg,transparent 75%,#ccc8c0 75%);
}
.filter-canvas {
  max-width: 100%;
  max-height: 160px;
  display: block;
  image-rendering: pixelated;
}

/* Cell label styled via .filter-label / .filter-icon / .filter-label-text in the icon section */
.filter-label { padding: 7px 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.filter-label-text { flex: 1; min-width: 0; }

/* Per-card download button (revealed on hover / when downloaded) */
.cell-download {
  width: 26px; height: 26px; flex-shrink: 0;
  display: grid; place-items: center;
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  background: var(--surface); color: var(--text-muted);
  opacity: 0;
  transition: opacity var(--transition), color var(--transition), border-color var(--transition), background var(--transition);
}
.cell-download svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.filter-cell:hover .cell-download, .cell-download:focus-visible { opacity: 1; }
.cell-download:hover { color: var(--accent); border-color: var(--accent); }
.filter-cell.downloaded .cell-download {
  opacity: 1; color: var(--accent); border-color: var(--accent); background: var(--accent-dim);
}
@media (hover: none) { .cell-download { opacity: 1; } }
.filter-cell[data-id="original"] .cell-download { display: none; }

/* ── Settings drawer ───────────────────────────────────────── */
.settings-scrim {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(3px);
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.settings-scrim.open { opacity: 1; pointer-events: auto; }
.settings-box {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  z-index: 95;
  width: min(420px, 92vw);
  padding: 18px 20px 28px;
  border-left: 1px solid var(--border);
  background: var(--surface);
  box-shadow: -16px 0 48px rgba(0,0,0,0.4);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform var(--transition);
}
.settings-box:not([hidden]) { transform: translateX(0); }
.settings-preview-wrap {
  height: 240px;
  margin-bottom: 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  overflow: hidden;
  display: grid; place-items: center;
  background:
    linear-gradient(45deg,#2a2a26 25%,transparent 25%),
    linear-gradient(-45deg,#2a2a26 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#2a2a26 75%),
    linear-gradient(-45deg,transparent 75%,#2a2a26 75%);
  background-size: 12px 12px;
  background-position: 0 0,0 6px,6px -6px,-6px 0;
  background-color: #1c1c18;
}
[data-theme="light"] .settings-preview-wrap {
  background-color: #e0dcd4;
  background-image:
    linear-gradient(45deg,#ccc8c0 25%,transparent 25%),
    linear-gradient(-45deg,#ccc8c0 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#ccc8c0 75%),
    linear-gradient(-45deg,transparent 75%,#ccc8c0 75%);
}
.settings-preview-wrap canvas { max-width: 100%; max-height: 240px; image-rendering: pixelated; }
.settings-foot { margin-top: 18px; display: flex; gap: 10px; }
.settings-foot .btn { flex: 1; }
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.settings-title {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
}
.settings-title em { font-style: normal; color: var(--text-muted); font-weight: 500; margin-left: 6px; font-family: var(--font-mono); font-size: 0.72rem; }
.settings-close {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  background: transparent; color: var(--text-muted); font-size: 1.1rem; line-height: 1;
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition);
}
.settings-close:hover { color: var(--text); border-color: var(--border-hover); }

.settings-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.55;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.settings-desc:empty { display: none; }
.settings-content { display: flex; flex-direction: column; gap: 12px; }
.param-row { display: grid; gap: 6px; }
.param-label {
  font-family: var(--font-mono);
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.param-controls { display: flex; align-items: center; gap: 10px; }
.param-controls input[type=range] {
  flex: 1;
  -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 2px;
  background: var(--border-hover); outline: none;
  accent-color: var(--accent);
}
.param-controls select {
  flex: 1;
  min-height: 34px;
  padding: 6px 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface-card);
  color: var(--text);
  font: inherit;
}
.param-controls input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 0;
}
.param-controls input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 0;
}
.param-val {
  min-width: 38px; text-align: right;
  font-family: var(--font-mono); font-size: 0.78rem; color: var(--text);
}
.param-controls select + .param-val { display: none; }

/* ── Toast ─────────────────────────────────────────────────── */
.toast {
  position: fixed; right: 20px; bottom: 20px; z-index: 1000;
  max-width: min(360px, calc(100vw - 40px));
  padding: 11px 14px;
  border: 1px solid var(--border-hover); border-radius: var(--radius-sm);
  background: var(--surface-raised); color: var(--text);
  box-shadow: 0 12px 36px rgba(0,0,0,0.35);
  font-size: 0.84rem;
  opacity: 0; transform: translateY(8px); pointer-events: none;
  transition: opacity var(--transition), transform var(--transition);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Filter list toggle (mobile) ────────────────────────────── */
.filter-list-toggle {
  display: none;
  width: 100%;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface-card);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}
.filter-list-toggle:hover { background: var(--surface-raised); border-color: var(--border-hover); }
.filter-list-toggle-arrow { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s; }
.filter-list-toggle[aria-expanded="true"] .filter-list-toggle-arrow { transform: rotate(180deg); }

/* ── Filter tooltip ─────────────────────────────────────────── */
.filter-tooltip {
  position: fixed;
  z-index: 200;
  max-width: 240px;
  padding: 8px 12px;
  border: 1px solid var(--border-hover);
  border-radius: var(--radius-xs);
  background: var(--surface-raised);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  font-size: 0.78rem;
  line-height: 1.5;
  color: var(--text-muted);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.filter-tooltip.visible { opacity: 1; }
.filter-tooltip-name {
  display: block;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.filter-tooltip-name em {
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 5px;
}
@media (hover: none) { .filter-tooltip { display: none; } }

/* ── Mobile header adjustments ─────────────────────────────── */
@media (max-width: 860px) {
  .filter-list-toggle { display: flex; }
  .filter-list-wrap { overflow: hidden; }
  .filter-list-wrap[hidden] { display: none; }
}
@media (max-width: 600px) {
  .header { padding: 11px 16px; }
  .header-badge { display: none; }
  .content { padding: 14px 14px 50px; }
  .sidebar { padding: 16px 14px; }
  .btn-sm { min-height: 36px; padding: 6px 12px; } /* larger touch targets */
  .filter-canvas-wrap { height: 130px; }
  .filter-canvas { max-height: 130px; }
  .settings-box { top: 64px; }
  .all-tools-btn { display: none; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    scroll-behavior: auto !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
<!-- Custom cursor styles (js/cursor.js injects the elements) -->
<link rel="stylesheet" href="../../css/cursor.css">
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────── -->
<header class="header">
  <div class="header-left">
    <a class="nav__logo" id="nav-logo" href="../../index.html">cloonk ʕ·ᴥ·ʔ</a>
    <span class="header-project">Darkroom</span>
    <span class="header-badge">28 filters · local</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-sm btn-accent" id="downloadAllBtn">Download all</button>
    <a class="btn btn-sm all-tools-btn" href="../">All tools</a>
    <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- ── Discovery toolbar ─────────────────────────────────────── -->
<div class="toolbar">
  <label class="source-control" id="dropzone" title="Drop or tap to replace the source image">
    <input type="file" id="fileInput" accept="image/*">
    <span class="source-thumb" id="sourceThumb" aria-hidden="true">🌱</span>
    <span class="source-meta">
      <span class="source-name" id="sourceName">Sample sprout</span>
      <span class="source-sub" id="sourceSub">Drop or tap to use yours</span>
    </span>
  </label>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="search" aria-label="Search filters" placeholder="Search filters…" autocomplete="off" spellcheck="false">
  </div>
  <div class="family-filters" id="familyFilters"></div>
  <span class="filter-count" id="filterCount"></span>
</div>

<!-- ── Layout ────────────────────────────────────────────────── -->
<div class="shell">
  <main class="content">
    <div class="studio-status" id="studioStatus" role="status" aria-live="polite" hidden></div>
    <div class="workspace">
      <div id="filterGrid" class="filter-grid"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="darkroom.js"></script>
<script>
(function() {
  // ── Discovery toolbar: family chips + search over the grid ──
  let activeFamily = null;
  let searchTerm   = '';

  const familyWrap = document.getElementById('familyFilters');
  const allBtn = document.createElement('button');
  allBtn.className = 'family-btn active';
  allBtn.textContent = 'All';
  allBtn.setAttribute('aria-pressed', 'true');
  allBtn.addEventListener('click', () => setFamily(null));
  familyWrap.appendChild(allBtn);
  ALL_FAMILIES.forEach(fam => {
    const btn = document.createElement('button');
    btn.className = 'family-btn';
    btn.textContent = fam;
    btn.setAttribute('aria-pressed', 'false');
    btn.addEventListener('click', () => setFamily(fam));
    familyWrap.appendChild(btn);
  });

  function setFamily(fam) {
    activeFamily = fam;
    document.querySelectorAll('.family-btn').forEach(b => {
      const on = fam ? b.textContent === fam : b.textContent === 'All';
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', String(on));
    });
    applyFilters();
  }

  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', e => {
    searchTerm = e.target.value.trim().toLowerCase();
    applyFilters();
  });

  function applyFilters() {
    let count = 0;
    document.querySelectorAll('.filter-cell[data-id]').forEach(cell => {
      const id = cell.dataset.id;
      if (id === 'original') { cell.removeAttribute('data-hidden'); return; }
      const f    = FILTERS.find(x => x.id === id) || {};
      const fam  = FILTER_FAMILIES[id] || '';
      const desc = FILTER_DESCRIPTIONS[id] || '';
      const hay  = `${f.name || ''} ${f.sub || ''} ${fam} ${desc}`.toLowerCase();
      const matchSearch = !searchTerm || hay.includes(searchTerm);
      const matchFamily = !activeFamily || fam === activeFamily;
      const hidden = !(matchSearch && matchFamily);
      cell.toggleAttribute('data-hidden', hidden);
      if (!hidden) count++;
    });
    const cnt = document.getElementById('filterCount');
    if (cnt) cnt.textContent = `${count} shown`;
  }

  // ── Source label / thumbnail (called by darkroom.js) ──
  window.refreshSourceLabel = function(name, w, h, isDefault) {
    const thumb  = document.getElementById('sourceThumb');
    const nameEl = document.getElementById('sourceName');
    const subEl  = document.getElementById('sourceSub');
    if (thumb) {
      if (isDefault) {
        thumb.textContent = '🌱';
      } else if (state.src) {
        thumb.textContent = '';
        const c = document.createElement('canvas');
        c.width = 26; c.height = 26;
        c.getContext('2d').drawImage(state.src, 0, 0, 26, 26);
        thumb.appendChild(c);
      }
    }
    if (nameEl) nameEl.textContent = isDefault ? 'Sample sprout' : (name || 'Your image');
    if (subEl)  subEl.textContent  = isDefault
      ? 'Drop or tap to use yours'
      : ((w && h) ? `${w}×${h} · tap to replace` : 'tap to replace');
  };

  // Filter pre-selection from ?filter=/hash is handled in darkroom.js init().
  applyFilters();
})();
</script>
